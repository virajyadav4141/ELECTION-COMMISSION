<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-900 text-white p-6">

<h1 class="text-2xl mb-4">Dashboard</h1>

<div class="grid grid-cols-4 gap-4 mb-6">
<div class="bg-blue-500 p-4 rounded">Total: {{total}}</div>
<div class="bg-green-500 p-4 rounded">Voted: {{voted}}</div>
<div class="bg-red-500 p-4 rounded">Remaining: {{remaining}}</div>
<div class="bg-purple-500 p-4 rounded">Candidates: {{candidates}}</div>
</div>

<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById("chart"), {
type: "bar",
data: {
labels: ["Total", "Voted", "Remaining"],
datasets: [{
data: [{{total}}, {{voted}}, {{remaining}}]
}]
}
});
</script>

<a href="/admin">
<button class="bg-gray-500 px-4 py-2 mt-4">Back</button>
</a>

</body>
</html>
