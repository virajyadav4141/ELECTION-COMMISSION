<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-6 rounded shadow w-96">

<h2 class="text-xl mb-4 text-center font-bold">Election Panel</h2>

<!-- CREATE -->
<form action="/create_election" method="POST" class="mb-4">
  <input name="name" placeholder="New Election Name" class="border p-2 w-full mb-2">
  <button class="bg-blue-700 text-white w-full py-2">Create Election</button>
</form>

<hr class="my-4">

<!-- LIST -->
<h3 class="mb-2 font-semibold">Existing Elections</h3>

{% for e in elections %}
<div class="flex justify-between items-center bg-gray-200 p-2 mb-2 rounded">

  <a href="/select_election/{{e[0]}}" class="text-blue-700 font-semibold">
    {{e[1]}}
  </a>

  <a href="/delete_election/{{e[0]}}" onclick="return confirm('Delete election?')">
    <button class="bg-red-500 text-white px-2 py-1 text-sm">Delete</button>
  </a>

</div>
{% endfor %}

</div>

</body>
</html>
