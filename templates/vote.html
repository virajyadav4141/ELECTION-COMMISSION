<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white">

<h1 class="text-center text-2xl p-4">Electronic Voting Machine</h1>

<!-- VOTER NAME -->
<div class="text-center mb-4">
  <h2 class="text-lg">Voter: {{session.get("voter_name","")}}</h2>
</div>

<form method="POST" class="p-4">

{% for pos in positions %}
<h2 class="mt-4 text-lg">{{pos[1]}}</h2>

<div class="grid grid-cols-2 gap-2">

{% for c in candidates %}
{% if c[2]|lower|trim == pos[1]|lower|trim %}

<label class="flex items-center justify-between bg-slate-800 p-2 rounded">

  <div class="flex items-center">

    <!-- IMAGE LOGIC -->
    {% if c[3] and c[3].startswith('http') %}
      <img src="{{c[3]}}" width="30" class="mr-2 rounded">
    {% endif %}

    <span>{{c[1]}}</span>
  </div>

  <input type="radio" name="{{pos[1]}}" value="{{c[0]}}">

</label>

{% endif %}
{% endfor %}

</div>
{% endfor %}

<button class="bg-green-600 px-6 py-2 mt-4 w-full rounded">
  Submit Vote
</button>

</form>

</body>
</html>
