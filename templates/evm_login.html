<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen">

<div class="bg-gray-900 p-6 rounded w-80">

<h2 class="text-white text-xl mb-4 text-center">EVM Machine Login</h2>

<form method="POST">

<input name="username" placeholder="Machine ID"
class="w-full p-2 mb-3 text-black">

<input type="password" name="password" placeholder="Password"
class="w-full p-2 mb-3 text-black">

<button class="bg-green-600 w-full py-2 text-white">
Login
</button>

</form>

</div>

</body>
</html>
