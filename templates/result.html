<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white p-6">

<h1 class="text-2xl mb-4">Results</h1>

{% for r in data %}
<div class="bg-slate-800 p-3 m-2 rounded">
  {{r[0]}} ({{r[1]}}) - Votes: {{r[2]}}
</div>
{% endfor %}

<a href="/logout">
  <button class="bg-red-500 px-4 py-2 mt-4">Logout</button>
</a>

</body>
</html>
